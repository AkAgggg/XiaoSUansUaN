<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小算算</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
  }
  .container {
    max-width: 720px;
    width: 100%;
  }
  h1 {
    text-align: center;
    font-size: 1.5em;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 0.75em;
    margin-bottom: 10px;
  }

  .group-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    border: 1px solid #2a2a3e;
  }
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .group-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-title {
    font-size: 0.95em;
    font-weight: 700;
    color: #fff;
  }
  .group-title span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .group-a .group-title span { background: #ff6b6b; }
  .group-b .group-title span { background: #4ecdc4; }
  .water-fee {
    background: #252540;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.95em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .water-fee-label { color: #888; font-size: 0.85em; }
  .water-fee-value {
    color: #ffa500;
    font-weight: 800;
    font-size: 1.05em;
    min-width: 55px;
    text-align: right;
  }
  .odds-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .odds-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .odds-label {
    font-size: 0.78em;
    color: #999;
    font-weight: 500;
  }
  .odds-input {
    width: 100%;
    padding: 12px 6px;
    border-radius: 8px;
    border: 1.5px solid #333;
    background: #12121f;
    color: #fff;
    font-size: 1.15em;
    text-align: center;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    font-weight: 600;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .odds-input::-webkit-outer-spin-button,
  .odds-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .odds-input:focus {
    border-color: #ffa500;
    box-shadow: 0 0 8px rgba(255,165,0,0.15);
  }
  .odds-input::placeholder {
    color: #444;
    font-weight: 400;
    font-size: 0.9em;
  }

  /* 每组内重置按钮 */
  .group-reset-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
  }
  .reset-btn {
    padding: 8px 0;
    border-radius: 8px;
    border: 1.5px solid #3a3a4e;
    background: #1a1a2e;
    color: #ccc;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .reset-btn:active {
    transform: scale(0.97);
  }
  .reset-btn:hover {
    border-color: #ffa500;
    color: #ffa500;
  }

  /* 结果区 */
  .result-card {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 8px;
    border: 1px solid #2a2a3e;
  }
  .result-title {
    font-size: 0.9em;
    font-weight: 700;
    color: #ccc;
    margin-bottom: 8px;
  }
  .result-section {
    margin-bottom: 6px;
  }
  .result-section:last-child { margin-bottom: 0; }
  .result-section-title {
    font-size: 0.72em;
    color: #777;
    margin-bottom: 5px;
  }
  .result-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .result-item {
    background: #12121f;
    border-radius: 8px;
    padding: 6px 8px;
    text-align: center;
    border: 1px solid #222;
  }
  .result-item-label {
    font-size: 0.7em;
    color: #888;
  }
  .result-item-value {
    font-size: 1em;
    font-weight: 700;
    color: #4ecdc4;
  }
  .verify-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    font-size: 0.75em;
    padding: 2px 0;
  }

  /* 最终结果 */
  .final-card {
    background: linear-gradient(135deg, #2a1a1a 0%, #1e1e35 100%);
    border: 1.5px solid #ffa500;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 8px;
  }
  .final-title {
    font-size: 0.9em;
    font-weight: 700;
    color: #ffa500;
    margin-bottom: 8px;
    text-align: center;
  }
  .final-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .final-item {
    background: #12121f;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    border: 1px solid #2a2a3e;
  }
  .final-item-label {
    font-size: 0.75em;
    color: #aaa;
    margin-bottom: 4px;
  }
  .final-item-value {
    font-size: 1.2em;
    font-weight: 800;
  }
  .final-item-value.negative { color: #ff6b6b; }
  .final-item-value.positive { color: #4ecdc4; }
  .final-item-value.zero { color: #888; }
  .final-item-detail {
    font-size: 0.65em;
    color: #666;
    margin-top: 3px;
    line-height: 1.4;
  }
  .final-item-tag {
    font-size: 0.78em;
    font-weight: 700;
    margin-top: 5px;
  }
  .tag-great { color: #ffd700; }
  .tag-mid { color: #4ecdc4; }
  .tag-low { color: #ff6b6b; }

  .placeholder-msg {
    text-align: center;
    color: #444;
    padding: 10px;
    font-size: 0.85em;
  }
  .formula-hint {
    text-align: center;
    color: #444;
    font-size: 0.65em;
    margin-top: 6px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <h1>小算算</h1>
  <p class="subtitle">赔率水费换算 · 等比调整计算器</p>

  <!-- 第一组：模型赔率 -->
  <div class="group-card group-a">
    <div class="group-header">
      <div class="group-left">
        <div class="group-title"><span></span>第一组（模型）</div>
      </div>
      <div class="water-fee">
        <span class="water-fee-label">水费</span>
        <span class="water-fee-value" id="water1">--</span>
      </div>
    </div>
    <div class="odds-row">
      <div class="odds-item">
        <div class="odds-label">小甲</div>
        <input type="number" class="odds-input" id="a1" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
      <div class="odds-item">
        <div class="odds-label">小乙</div>
        <input type="number" class="odds-input" id="a2" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
      <div class="odds-item">
        <div class="odds-label">小丙</div>
        <input type="number" class="odds-input" id="a3" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
    </div>
    <div class="group-reset-row">
      <button class="reset-btn" onclick="resetGroup('a')">重 置</button>
      <button class="reset-btn" onclick="resetAll()">全部重置</button>
    </div>
  </div>

  <!-- 第二组：恶魔赔率 -->
  <div class="group-card group-b">
    <div class="group-header">
      <div class="group-left">
        <div class="group-title"><span></span>第二组（恶魔）</div>
      </div>
      <div class="water-fee">
        <span class="water-fee-label">水费</span>
        <span class="water-fee-value" id="water2">--</span>
      </div>
    </div>
    <div class="odds-row">
      <div class="odds-item">
        <div class="odds-label">小甲</div>
        <input type="number" class="odds-input" id="b1" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
      <div class="odds-item">
        <div class="odds-label">小乙</div>
        <input type="number" class="odds-input" id="b2" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
      <div class="odds-item">
        <div class="odds-label">小丙</div>
        <input type="number" class="odds-input" id="b3" placeholder="赔率" step="0.001" oninput="calculate()">
      </div>
    </div>
    <div class="group-reset-row">
      <button class="reset-btn" onclick="resetGroup('b')">重 置</button>
      <button class="reset-btn" onclick="resetAll()">全部重置</button>
    </div>
  </div>

  <!-- 结果 -->
  <div id="results-area"></div>

  <div class="formula-hint">
    水费=1−1/(1/a+1/b+1/c)·100% ｜ 等比调整：将模型赔率等比缩放至水费=恶魔水费（抽水额等分） ｜ 差值=新赔率−恶魔赔率
  </div>
</div>

<script>
// 支持2个或3个赔率计算水费
function getWaterFee(odds) {
  const valid = odds.filter(o => o > 0);
  if (valid.length < 2) return null;
  const impliedSum = valid.reduce((s, o) => s + 1/o, 0);
  if (impliedSum <= 0) return null;
  return 1 - 1/impliedSum;
}

function round3(v) { return Math.round(v * 1000) / 1000; }

function resetGroup(g) {
  if (g === 'a') {
    ['a1','a2','a3'].forEach(id => document.getElementById(id).value = '');
  } else {
    ['b1','b2','b3'].forEach(id => document.getElementById(id).value = '');
  }
  calculate();
}
function resetAll() {
  ['a1','a2','a3','b1','b2','b3'].forEach(id => document.getElementById(id).value = '');
  calculate();
}

function calculate() {
  const a1 = parseFloat(document.getElementById('a1').value);
  const a2 = parseFloat(document.getElementById('a2').value);
  const a3 = parseFloat(document.getElementById('a3').value);
  const b1 = parseFloat(document.getElementById('b1').value);
  const b2 = parseFloat(document.getElementById('b2').value);
  const b3 = parseFloat(document.getElementById('b3').value);

  const oddsA = [a1, a2, a3].filter(v => !isNaN(v) && v > 0);
  const oddsB = [b1, b2, b3].filter(v => !isNaN(v) && v > 0);

  const w1 = getWaterFee(oddsA);
  document.getElementById('water1').textContent = w1 !== null ? (w1*100).toFixed(3)+'%' : 'NaN%';

  const w2 = getWaterFee(oddsB);
  document.getElementById('water2').textContent = w2 !== null ? (w2*100).toFixed(3)+'%' : 'NaN%';

  const area = document.getElementById('results-area');

  // 如果没填够2个赔率，也显示空的结果区（保持版面一致），用NaN风格
  if (w1 === null || w2 === null) {
    const na = 'NaN';
    const naPct = 'NaN%';
    area.innerHTML = `
    <div class="result-card">
      <div class="result-title">等比调整结果</div>
      <div class="result-section">
        <div class="result-section-title">调整后新赔率</div>
        <div class="result-row">
          <div class="result-item">
            <div class="result-item-label">小甲</div>
            <div class="result-item-value">${na}</div>
          </div>
          <div class="result-item">
            <div class="result-item-label">小乙</div>
            <div class="result-item-value">${na}</div>
          </div>
          <div class="result-item">
            <div class="result-item-label">小丙</div>
            <div class="result-item-value">${na}</div>
          </div>
        </div>
      </div>
      <div class="verify-row">
        <span style="color:#ff6b6b;">原${naPct}</span>
        <span style="color:#4ecdc4;">压${naPct}</span>
        <span style="color:#ffa500;">标${naPct}</span>
      </div>
    </div>
    <div class="final-card">
      <div class="final-title">🎯 最终差值（新赔率 − 恶魔赔率）</div>
      <div class="final-row">
        <div class="final-item">
          <div class="final-item-label">小甲</div>
          <div class="final-item-value zero">${na}</div>
          <div class="final-item-detail">${na}−${na}</div>
        </div>
        <div class="final-item">
          <div class="final-item-label">小乙</div>
          <div class="final-item-value zero">${na}</div>
          <div class="final-item-detail">${na}−${na}</div>
        </div>
        <div class="final-item">
          <div class="final-item-label">小丙</div>
          <div class="final-item-value zero">${na}</div>
          <div class="final-item-detail">${na}−${na}</div>
        </div>
      </div>
    </div>
    `;
    return;
  }

  // 等比调整：将模型赔率等比缩放，使水费率 = 恶魔水费率
  // 算法：用模型赔率的隐含概率作为下注分布，等比缩放让抽水额等分
  const S1 = oddsA.reduce((s, o) => s + 1/o, 0);
  const STarget = 1/(1-w2);
  const k = S1/STarget;  // 等比缩放因子

  // 计算每个位置的新赔率和差值
  const labels = ['小甲', '小乙', '小丙'];
  const aVals = [a1, a2, a3];
  const bVals = [b1, b2, b3];
  const items = [];

  for (let i = 0; i < 3; i++) {
    const a = aVals[i];
    const b = bVals[i];
    const aValid = !isNaN(a) && a > 0;
    const bValid = !isNaN(b) && b > 0;
    const newOddsRaw = aValid ? a * k : null;
    const newOdds = aValid ? round3(newOddsRaw) : null;
    const val = (aValid && bValid) ? round3(newOddsRaw - b) : null;
    items.push({
      label: labels[i],
      val: val,
      newOdds: newOdds,
      newOddsRaw: newOddsRaw,  // 保留完整精度用于验证水费
      bOdds: bValid ? b : null
    });
  }

  // 验证水费（用完整精度计算，确保压制后水费精确等于恶魔水费）
  const newWaterItems = items.filter(d => d.newOddsRaw !== null);
  const newWater = newWaterItems.length >= 2
    ? getWaterFee(newWaterItems.map(d => d.newOddsRaw))
    : null;

  // 排名标签：两正一负→大正/小正/负数，两负一正→正数/大负/小负，同号则都带大小
  const diffItems = items.filter(d => d.val !== null);
  diffItems.sort((a, b) => b.val - a.val);  // 从大到小排序

  const positives = diffItems.filter(d => d.val > 0);
  const negatives = diffItems.filter(d => d.val < 0);

  const tags = {};
  if (positives.length === 2 && negatives.length === 1) {
    // 两正一负
    tags[positives[0].label] = { text: '大正', cls: 'tag-great' };
    tags[positives[1].label] = { text: '小正', cls: 'tag-mid' };
    tags[negatives[0].label] = { text: '负数', cls: 'tag-low' };
  } else if (positives.length === 1 && negatives.length === 2) {
    // 两负一正
    tags[positives[0].label] = { text: '正数', cls: 'tag-great' };
    tags[negatives[0].label] = { text: '小负', cls: 'tag-mid' };
    tags[negatives[1].label] = { text: '大负', cls: 'tag-low' };
  } else {
    // 其他情况：全正或全负或一正一负
    if (positives.length >= 1) tags[positives[0].label] = { text: '大正', cls: 'tag-great' };
    if (positives.length >= 2) {
      for (let i = 1; i < positives.length; i++) {
        tags[positives[i].label] = { text: '小正', cls: 'tag-mid' };
      }
    }
    if (negatives.length >= 1) tags[negatives[negatives.length-1].label] = { text: '大负', cls: 'tag-low' };
    if (negatives.length >= 2) {
      for (let i = 0; i < negatives.length - 1; i++) {
        tags[negatives[i].label] = { text: '小负', cls: 'tag-mid' };
      }
    }
  }

  function dc(v) {
    if (v === null) return 'zero';
    return v > 0 ? 'positive' : v < 0 ? 'negative' : 'zero';
  }
  function ds(v) { return v > 0 ? '+' : ''; }

  function buildFinalItem(d) {
    const tag = tags[d.label];
    const tagHtml = tag ? `<div class="final-item-tag ${tag.cls}">${tag.text}</div>` : '';
    const valStr = d.val !== null ? `${ds(d.val)}${d.val.toFixed(3)}` : '--';
    const detailStr = (d.newOdds !== null ? d.newOdds.toFixed(3) : '--') + '−' + (d.bOdds !== null ? d.bOdds.toFixed(3) : '--');
    return `
      <div class="final-item">
        <div class="final-item-label">${d.label}</div>
        <div class="final-item-value ${dc(d.val)}">${valStr}</div>
        <div class="final-item-detail">${detailStr}</div>
        ${tagHtml}
      </div>`;
  }

  area.innerHTML = `
    <div class="result-card">
      <div class="result-title">等比调整结果</div>
      <div class="result-section">
        <div class="result-section-title">调整后新赔率</div>
        <div class="result-row">
          <div class="result-item">
            <div class="result-item-label">小甲</div>
            <div class="result-item-value">${items[0].newOdds !== null ? items[0].newOdds.toFixed(3) : '--'}</div>
          </div>
          <div class="result-item">
            <div class="result-item-label">小乙</div>
            <div class="result-item-value">${items[1].newOdds !== null ? items[1].newOdds.toFixed(3) : '--'}</div>
          </div>
          <div class="result-item">
            <div class="result-item-label">小丙</div>
            <div class="result-item-value">${items[2].newOdds !== null ? items[2].newOdds.toFixed(3) : '--'}</div>
          </div>
        </div>
      </div>
      <div class="verify-row">
        <span style="color:#ff6b6b;">原${(w1*100).toFixed(3)}%</span>
        <span style="color:#4ecdc4;">压${newWater!==null?(newWater*100).toFixed(3)+'%':'--'}</span>
        <span style="color:#ffa500;">标${(w2*100).toFixed(3)}%</span>
      </div>
    </div>
    <div class="final-card">
      <div class="final-title">🎯 最终差值（新赔率 − 恶魔赔率）</div>
      <div class="final-row">
        ${buildFinalItem(items[0])}
        ${buildFinalItem(items[1])}
        ${buildFinalItem(items[2])}
      </div>
    </div>
  `;
}

calculate();
</script>
</body>
</html>
